<title>Robot Power Distribution Schematic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#fff;color:#1a1a1a;padding:24px;}
@media(prefers-color-scheme:dark){body{background:#1a1a18;color:#e8e6df;}}
h1{font-size:15px;font-weight:500;margin-bottom:4px;color:#1a1a1a;}
@media(prefers-color-scheme:dark){h1{color:#e8e6df;}}
p{font-size:12px;color:#5f5e5a;margin-bottom:16px;}
svg{width:100%;height:auto;display:block;}

/* Pre-built diagram classes (light mode) */
.t  {font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:14px;font-weight:400;fill:#1a1a1a;}
.ts {font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:12px;font-weight:400;fill:#5f5e5a;}
.th {font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:14px;font-weight:500;fill:#1a1a1a;}

/* c-coral (11.1V domain) */
.c-coral rect,.c-coral ellipse,.c-coral circle{fill:#FAECE7;stroke:#993C1D;}
.c-coral .th{fill:#712B13;}.c-coral .ts{fill:#993C1D;}

/* c-amber (5V domain) */
.c-amber rect,.c-amber ellipse,.c-amber circle{fill:#FAEEDA;stroke:#854F0B;}
.c-amber .th{fill:#633806;}.c-amber .ts{fill:#854F0B;}

/* c-purple (ESP32, TB6612FNG) */
.c-purple rect,.c-purple ellipse,.c-purple circle{fill:#EEEDFE;stroke:#534AB7;}
.c-purple .th{fill:#3C3489;}.c-purple .ts{fill:#534AB7;}

/* c-teal (motors, MPU-6050) */
.c-teal rect,.c-teal ellipse,.c-teal circle{fill:#E1F5EE;stroke:#0F6E56;}
.c-teal .th{fill:#085041;}.c-teal .ts{fill:#0F6E56;}

/* c-gray (legend box) */
.c-gray rect,.c-gray ellipse,.c-gray circle{fill:#F1EFE8;stroke:#5F5E5A;}
.c-gray .th{fill:#2C2C2A;}.c-gray .ts{fill:#5F5E5A;}

/* dark mode overrides */
@media(prefers-color-scheme:dark){
  .t{fill:#e8e6df;} .ts{fill:#9a9890;} .th{fill:#e8e6df;}
  .c-coral rect,.c-coral ellipse,.c-coral circle{fill:#4A1B0C;stroke:#F0997B;}
  .c-coral .th{fill:#F5C4B3;}.c-coral .ts{fill:#F0997B;}
  .c-amber rect,.c-amber ellipse,.c-amber circle{fill:#412402;stroke:#EF9F27;}
  .c-amber .th{fill:#FAC775;}.c-amber .ts{fill:#EF9F27;}
  .c-purple rect,.c-purple ellipse,.c-purple circle{fill:#26215C;stroke:#AFA9EC;}
  .c-purple .th{fill:#CECBF6;}.c-purple .ts{fill:#AFA9EC;}
  .c-teal rect,.c-teal ellipse,.c-teal circle{fill:#04342C;stroke:#5DCAA5;}
  .c-teal .th{fill:#9FE1CB;}.c-teal .ts{fill:#5DCAA5;}
  .c-gray rect,.c-gray ellipse,.c-gray circle{fill:#2C2C2A;stroke:#B4B2A9;}
  .c-gray .th{fill:#e8e6df;}.c-gray .ts{fill:#B4B2A9;}
}

</head>
